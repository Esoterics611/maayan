name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      # core + dev + the light UI extra (fastapi/uvicorn) so ui/app.py typechecks
      # with real types and tests/test_ui.py can import. The heavy ml extra
      # (torch/FlagEmbedding) stays out — mypy ignores it; tests mock the model.
      - name: Sync (core + dev + ui)
        run: uv sync --extra ui

      - name: Lint
        run: uv run ruff check maayan tests

      - name: Typecheck
        run: uv run mypy maayan

      - name: Test
        run: uv run pytest
