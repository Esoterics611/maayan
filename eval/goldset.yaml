# Retrieval gold set for maayan — Likutei Amarim (Tanya, Part I), all 53 chapters.
#
# POSITIVE cases: a question + the chapter(s) that should be retrieved. Refs are
#   chapter-level; metrics match any segment within (e.g. "...1" matches "...1:13").
# NEGATIVE cases: set `should_refuse: true` with empty expected_refs. The correct
#   behavior is for the default-deny gate to REFUSE (retrieval relevance below the
#   threshold) — these measure the gate, not ranking, and are excluded from
#   hit@k / recall@k / MRR.
#
# EDIT FREELY: better gold = more trustworthy numbers. Hand-curated, not
# authoritative. The corpus is currently only Tanya Part I (Likutei Amarim).
examples:
  # ---- Souls, faculties, garments (ch 1-5) --------------------------------
  - question: "מהן שתי הנפשות של האדם?"
    expected_refs: ["Tanya, Part I; Likkutei Amarim 1", "Tanya, Part I; Likkutei Amarim 2"]
    note: two souls — divine and animal

  - question: "מהי הנפש האלוקית חלק אלוק ממעל ממש?"
    expected_refs: ["Tanya, Part I; Likkutei Amarim 2"]

  - question: "מהן עשר הספירות שבנפש — חב\"ד ומדות?"
    expected_refs: ["Tanya, Part I; Likkutei Amarim 3"]

  - question: "מהם שלושת הלבושים מחשבה דיבור ומעשה?"
