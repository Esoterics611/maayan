<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>maayan · sign in</title>
  <style>
    :root { --bg:#f6f4ef; --panel:#fff; --ink:#23201b; --muted:#8a8275; --line:#e6e0d5; --accent:#7a5c2e; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
           background:var(--bg); color:var(--ink);
           font:16px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:14px;
            padding:30px 28px; width:340px; box-shadow:0 6px 24px rgba(0,0,0,.06); }
    h1 { margin:0 0 4px; font-size:22px; }
    .sub { color:var(--muted); margin:0 0 18px; font-size:14px; }
    label { display:block; font-size:13px; color:var(--muted); margin:12px 0 4px; }
    input { width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px; font-size:15px; }
    button { width:100%; margin-top:18px; padding:11px; border:0; border-radius:8px;
             background:var(--accent); color:#fff; font-size:15px; cursor:pointer; }
    button:disabled { opacity:.6; cursor:default; }
    .err { color:#a23; font-size:13px; min-height:18px; margin-top:10px; }
  </style>
</head>
<body>
  <form class="card" id="loginForm">
    <h1>מעיין · maayan</h1>
    <p class="sub">Sign in to continue.</p>
    <label for="u">Username</label>
    <input id="u" autocomplete="username" autofocus dir="auto" />
    <label for="p">Password</label>
    <input id="p" type="password" autocomplete="current-password" />
    <button id="btn" type="submit">Sign in</button>
    <div class="err" id="err"></div>
  </form>
  <script>
    const form = document.getElementById('loginForm');
    const err = document.getElementById('err');
    const btn = document.getElementById('btn');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.textContent = '';
      btn.disabled = true;
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('u').value,
            password: document.getElementById('p').value,
          }),
        });
        if (r.ok) { window.location.href = '/'; return; }
        const d = await r.json().catch(() => ({}));
        err.textContent = d.detail || 'Sign in failed.';
      } catch (_) {
        err.textContent = 'Network error.';
      }
      btn.disabled = false;
    });
  </script>
</body>
</html>
